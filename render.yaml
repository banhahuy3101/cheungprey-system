services:
  - type: web
    name: cheungprey-api
    runtime: go
    rootDir: backend
    buildCommand: go build -o app ./cmd/api
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
